<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Micro:bit Temperature Logger</title>
    <style>
        body { font-family: system-ui, -apple-system, sans-serif; padding: 20px; max-width: 800px; margin: 0 auto; background-color: #f4f4f9; }
        h1 { color: #333; }
        
        .controls { 
            margin-bottom: 20px; 
            padding: 15px; 
            background: white; 
            border-radius: 8px; 
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            display: flex;
            gap: 10px;
        }
        
        button { 
            padding: 10px 20px; 
            font-size: 16px; 
            cursor: pointer; 
            border: none; 
            border-radius: 5px; 
            transition: background 0.2s;
        }
        
        #connectBtn { background-color: #2ecc71; color: white; }
        #connectBtn:hover { background-color: #27ae60; }
        #connectBtn:disabled { background-color: #95a5a6; cursor: not-allowed; }
        
        #disconnectBtn { background-color: #e74c3c; color: white; }
        #disconnectBtn:hover { background-color: #c0392b; }
        #disconnectBtn:disabled { background-color: #95a5a6; cursor: not-allowed; }

        #exportBtn { background-color: #3498db; color: white; }
        #exportBtn:hover { background-color: #2980b9; }
        #exportBtn:disabled { background-color: #95a5a6; cursor: not-allowed; }

        #logWindow {
            background: #1e1e1e;
            color: #00ff00;
            border-radius: 8px;
            height: 400px;
            overflow-y: auto;
            padding: 15px;
            font-family: 'Courier New', monospace;
            white-space: pre-wrap;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
        }
        
        .log-entry { margin-bottom: 4px; border-bottom: 1px solid #333; padding-bottom: 2px; }
    </style>
</head>
<body>
    <h1>Micro:bit Temperature Logger</h1>
    
    <div class="controls">
        <button id="connectBtn">Connect Device</button>
        <button id="disconnectBtn" disabled>Disconnect</button>
        <button id="exportBtn" disabled>Export CSV</button>
    </div>

    <div id="logWindow"></div>

    <script>
        let port;
        let reader;
        let keepReading = false;
        let logData = []; // Store data for export: {time, temp}

        const connectBtn = document.getElementById('connectBtn');
        const disconnectBtn = document.getElementById('disconnectBtn');
        const exportBtn = document.getElementById('exportBtn');
        const logWindow = document.getElementById('logWindow');

        connectBtn.addEventListener('click', async () => {
            if ("serial" in navigator) {
                try {
                    port = await navigator.serial.requestPort();
                    await port.open({ baudRate: 115200 });
                    
                    keepReading = true;
                    connectBtn.disabled = true;
                    disconnectBtn.disabled = false;
                    exportBtn.disabled = false;
                    
                    readSerialLoop();
                } catch (err) {
                    console.error('Connection error:', err);
                    alert('Failed to connect: ' + err.message);
                }
            } else {
                alert('Web Serial API not supported in this browser. Please use Chrome, Edge, or Opera.');
            }
        });

        disconnectBtn.addEventListener('click', async () => {
            keepReading = false;
            if (reader) {
                await reader.cancel();
            }
            if (port) {
                await port.close();
            }
            connectBtn.disabled = false;
            disconnectBtn.disabled = true;
        });

        exportBtn.addEventListener('click', () => {
            if (logData.length === 0) {
                alert("No data to export.");
                return;
            }
            
            let csvContent = "data:text/csv;charset=utf-8,Timestamp,Temperature(C)\n";
            logData.forEach(row => {
                csvContent += `${row.time},${row.temp}\n`;
            });

            const encodedUri = encodeURI(csvContent);
            const link = document.createElement("a");
            link.setAttribute("href", encodedUri);
            link.setAttribute("download", "microbit_temperature_log.csv");
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        });

        async function readSerialLoop() {
            const textDecoder = new TextDecoderStream();
            const readableStreamClosed = port.readable.pipeTo(textDecoder.writable);
            reader = textDecoder.readable.getReader();
            
            let buffer = "";

            try {
                while (keepReading) {
                    const { value, done } = await reader.read();
                    if (done) {
                        break;
                    }
                    if (value) {
                        buffer += value;
                        const lines = buffer.split('\n');
                        // Process all complete lines
                        for (let i = 0; i < lines.length - 1; i++) {
                            processLine(lines[i]);
                        }
                        // Keep the last partial line in buffer
                        buffer = lines[lines.length - 1];
                    }
                }
            } catch (error) {
                console.error("Read error:", error);
            } finally {
                reader.releaseLock();
            }
        }

        function processLine(line) {
            const temp = line.trim();
            if (temp) {
                const now = new Date().toLocaleString();
                
                // Update UI
                const entry = document.createElement('div');
                entry.className = 'log-entry';
                entry.textContent = `[${now}] ${temp}°C`;
                logWindow.appendChild(entry);
                
                // Auto-scroll to bottom
                logWindow.scrollTop = logWindow.scrollHeight;

                // Store for export
                logData.push({ time: now, temp: temp });
            }
        }
    </script>
</body>
</html>
