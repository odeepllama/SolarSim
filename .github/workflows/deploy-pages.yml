name: Deploy All HTML to GitHub Pages
on:
  push:
    branches: ['**']
jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Build deploy directory
        run: |
          mkdir -p deploy

          if [ "${{ github.ref_name }}" = "main" ]; then
            # SolaSimStudio (USB wired) → /
            if [ -f SolaSimStudio.html ]; then
              cp SolaSimStudio.html deploy/index.html
              cp -f planty.svg planty_b\&w.svg deploy/ 2>/dev/null || true
            fi
            # SolaSimStudioBLE (iPad BLE) → /ble/
            # NOTE: BLE_iPad/ is currently private (gitignored) and not included in the public repo.
            # This block will activate once BLE_iPad/ is made public in a future release.
            if [ -f BLE_iPad/SolaSimStudioBLE.html ]; then
              mkdir -p deploy/ble
              cp BLE_iPad/SolaSimStudioBLE.html deploy/ble/index.html
              cp -f planty.svg planty_b\&w.svg deploy/ble/ 2>/dev/null || true
            fi
          else
            # SolaSimStudio (USB wired) → /test/
            if [ -f SolaSimStudio.html ]; then
              mkdir -p deploy/test
              cp SolaSimStudio.html deploy/test/index.html
              cp -f planty.svg planty_b\&w.svg deploy/test/ 2>/dev/null || true
            fi
            # SolaSimStudioBLE (iPad BLE) → /ble/test/
            # NOTE: BLE_iPad/ is currently private (see main branch comment above).
            if [ -f BLE_iPad/SolaSimStudioBLE.html ]; then
              mkdir -p deploy/ble/test
              cp BLE_iPad/SolaSimStudioBLE.html deploy/ble/test/index.html
              cp -f planty.svg planty_b\&w.svg deploy/ble/test/ 2>/dev/null || true
            fi
          fi
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./deploy
          keep_files: true
