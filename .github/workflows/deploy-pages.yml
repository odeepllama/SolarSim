name: Deploy All HTML to GitHub Pages
on:
  push:
    branches: ['**']
jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Build deploy directory
        run: |
          mkdir -p deploy

          if [ "${{ github.ref_name }}" = "main" ]; then
            # SolaSimStudio (unified wired USB) → /
            if [ -f ESP32_Bluetooth/SolaSimStudio.html ]; then
              cp ESP32_Bluetooth/SolaSimStudio.html deploy/index.html
              cp -f planty.svg planty_b\&w.svg deploy/ 2>/dev/null || true
            fi
            # SolaSimStudioBLE (iPad BLE) → /Bt/
            if [ -f BLE_iPad/SolaSimStudioBLE.html ]; then
              mkdir -p deploy/Bt
              cp BLE_iPad/SolaSimStudioBLE.html deploy/Bt/index.html
              cp -f planty.svg planty_b\&w.svg deploy/Bt/ 2>/dev/null || true
            fi
          else
            # SolaSimStudio (unified wired USB) → /test/
            if [ -f ESP32_Bluetooth/SolaSimStudio.html ]; then
              mkdir -p deploy/test
              cp ESP32_Bluetooth/SolaSimStudio.html deploy/test/index.html
              cp -f planty.svg planty_b\&w.svg deploy/test/ 2>/dev/null || true
            fi
            # SolaSimStudioBLE (iPad BLE) → /Bt/test/
            if [ -f BLE_iPad/SolaSimStudioBLE.html ]; then
              mkdir -p deploy/Bt/test
              cp BLE_iPad/SolaSimStudioBLE.html deploy/Bt/test/index.html
              cp -f planty.svg planty_b\&w.svg deploy/Bt/test/ 2>/dev/null || true
            fi
          fi
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./deploy
          keep_files: true
