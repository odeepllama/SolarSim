name: ProfileBuilder → Deploy Pages

on:
  push:
    branches: [ main ]
    paths:
      - 'ProfileBuilder.html'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Copy ProfileBuilder.html to index.html
        run: cp ProfileBuilder.html index.html

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
          keep_files: true
