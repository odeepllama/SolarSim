name: Deploy SolarSim BT
on:
  push:
    branches: ['**']
jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            mkdir -p deploy/Bt
            cp ESP32_Bluetooth/ProfileBuilderBt.html deploy/Bt/index.html
          else
            mkdir -p deploy/Bt/test
            cp ESP32_Bluetooth/ProfileBuilderBt.html deploy/Bt/test/index.html
          fi
      - uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./deploy
          keep_files: true
