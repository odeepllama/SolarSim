<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>BLE Minimal Test</title>
</head>
<body>
  <button onclick="connect()">Connect to BLE Device</button>
  <div id="result" style="margin-top:1em;font-family:monospace;"></div>
  <script>
    async function connect() {
      try {
        const device = await navigator.bluetooth.requestDevice({
          // Try with acceptAllDevices: true to see all BLE devices
          acceptAllDevices: true,
          optionalServices: ['12345678-1234-5678-1234-56789abcdef0']
        });
        document.getElementById('result').textContent = 'Found: ' + device.name + ' (' + device.id + ')';
      } catch (e) {
        document.getElementById('result').textContent = 'Error: ' + e;
      }
    }
  </script>
</body>
</html>
