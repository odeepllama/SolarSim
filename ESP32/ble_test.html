<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>SolarSim BLE Test</title>
  <style>
    body { font-family: monospace; padding: 16px; }
    button { margin-right: 8px; }
    #log { white-space: pre; border: 1px solid #ccc; padding: 8px; height: 240px; overflow: auto; }
  </style>
</head>
<body>
  <h3>SolarSim BLE Test (NUS)</h3>
  <button id="connect">Connect</button>
  <button id="disconnect">Disconnect</button>
  <input id="msg" placeholder="command (e.g., status)" />
  <button id="send">Send</button>
  <div id="log"></div>

<script>
const NUS_SERVICE = '6e400001-b5a3-f393-e0a9-e50e24dcca9e';
const NUS_RX = '6e400002-b5a3-f393-e0a9-e50e24dcca9e'; // write
const NUS_TX = '6e400003-b5a3-f393-e0a9-e50e24dcca9e'; // notify

let device, server, rxChar, txChar;

const log = (s) => {
  const el = document.getElementById('log');
  el.textContent += s + '\n';
  el.scrollTop = el.scrollHeight;
};

document.getElementById('connect').onclick = async () => {
  try {
    device = await navigator.bluetooth.requestDevice({
      acceptAllDevices: true,
      optionalServices: [NUS_SERVICE],
    });
    device.addEventListener('gattserverdisconnected', () => log('Disconnected'));
    server = await device.gatt.connect();
    const svc = await server.getPrimaryService(NUS_SERVICE);
    rxChar = await svc.getCharacteristic(NUS_RX);
    txChar = await svc.getCharacteristic(NUS_TX);
    await txChar.startNotifications();
    txChar.addEventListener('characteristicvaluechanged', (e) => {
      const v = new TextDecoder().decode(e.target.value);
      log('<< ' + v.trim());
    });
    log('Connected');
  } catch (err) {
    log('Error: ' + err);
  }
};

document.getElementById('disconnect').onclick = async () => {
  if (device && device.gatt.connected) device.gatt.disconnect();
};

document.getElementById('send').onclick = async () => {
  const msg = document.getElementById('msg').value.trim();
  if (!msg || !rxChar) return;
  const data = new TextEncoder().encode(msg + '\n');
  await rxChar.writeValue(data);
  log('>> ' + msg);
};
</script>
</body>
</html>
